<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GIF Description Practice</title>

  <!-- Google Fonts — Nunito (friendly, rounded sans-serif) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Our stylesheet -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ============================================================
       FIXED TOP HEADER BAR
       ============================================================ -->
  <header class="header" id="header">
    <div class="header-inner">
      <h1 class="header-title">
        <span class="header-icon" aria-hidden="true">🎬</span>
        GIF Description Practice
      </h1>
      <div class="header-spacer"></div>
      <!-- Gallery toggle button -->
      <button class="header-btn" id="galleryBtn" aria-label="Gallery view" title="Gallery view">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect>
        </svg>
      </button>
      <!-- Hamburger menu button -->
      <button class="header-btn" id="menuBtn" aria-label="Open menu" title="Menu">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="6" x2="21" y2="6"></line>
          <line x1="3" y1="12" x2="21" y2="12"></line>
          <line x1="3" y1="18" x2="21" y2="18"></line>
        </svg>
      </button>
    </div>
  </header>

  <!-- ============================================================
       SIDEBAR OVERLAY + PANEL
       ============================================================ -->
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar" aria-hidden="true">
    <div class="sidebar-header">
      <h2 class="sidebar-title">Pages</h2>
      <button class="sidebar-close" id="sidebarClose" aria-label="Close menu">&times;</button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="sidebarSearch" placeholder="Search pages…" autocomplete="off">
    </div>
    <nav class="sidebar-list" id="sidebarList" role="navigation" aria-label="Page list">
      <!-- Populated dynamically -->
    </nav>
  </aside>

  <!-- ============================================================
       MAIN CONTENT AREA
       ============================================================ -->
  <main class="main" id="main">
    <!-- This is populated dynamically by app.js -->
  </main>

  <!-- ============================================================
       NAVIGATION ARROWS (desktop: fixed to sides, mobile: inline)
       These live outside <main> so they can be position:fixed on desktop.
       ============================================================ -->
  <button class="nav-arrow nav-arrow--prev" id="prevBtn" aria-label="Previous page" title="Previous page">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>
  </button>
  <button class="nav-arrow nav-arrow--next" id="nextBtn" aria-label="Next page" title="Next page">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 6 15 12 9 18"></polyline></svg>
  </button>

  <!-- Data first, then app logic -->
  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
